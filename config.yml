      icon: "fa-brands fa-spotify"
      url: "https://open.spotify.com/artist/6VI0p0xTjBKKxQN8i8vGpD"
      title: "Spotify"
      alt: "Spotify"
      target: "_blank"
  - social:
      icon: "fa-brands fa-itunes"
      url: "https://music.apple.com/artist/zooey-wonder/820820884"
      title: "Apple Music"
      alt: "Apple Music"
      target: "_blank"
  - social:
