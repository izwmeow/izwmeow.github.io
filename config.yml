# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: default

# HTML Language setting
lang: "en"

# HTML Title
title: "ZooeyWonder | Links"

# Avatar image path
avatar: "./images/profile.jpg"

# Name section text
name: "@ZooeyWonder"

# Tagline section text
tagline: >-
    Singer-songwriter.

# List of social media links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# title: The url title
# url: The URL of the social media link
# alt: Alternative text for accessibility
# target: _blank opens in a new tab, _self opens in the same frame
socials:
   - social:
      icon: "fa-brands fa-spotify"
      url: "https://open.spotify.com/artist/6VI0p0xTjBKKxQN8i8vGpD"
      title: "Spotify"
      alt: "Spotify"
      target: "_blank"
   - social:
      icon: "fa-brands fa-itunes"
      url: "https://music.apple.com/artist/zooey-wonder/820820884"
      title: "Apple Music"
      alt: "Apple Music"
      target: "_blank"
  - social:
      icon: "fa-brands fa-instagram"
      url: "https://www.instagram.com/zooeywonder"
      title: "Instagram"
      alt: "Instagram"
      target: "_blank"
  - social:
      icon: "fa-brands fa-linkedin"
      url: "https://www.linkedin.com/in/zhgchgli/"
      title: "ZhgChgLi's LinkedIn"
      alt: "ZhgChgLi's LinkedIn"
      target: "_blank"
  - social:
      icon: "fa-brands fa-instagram"
      url: "https://www.instagram.com/zhgchgli/"
      title: "Instagram"
      alt: "ZhgChgLi's Instagram"
      target: "_blank"
  - social:
      icon: "fa-solid fa-envelope"
      url: "mailto:zhgchgli@gmail.com"
      title: "Email: zhgchgli@gmail.com"
      alt: "zhgchgli@gmail.com"
      target: "_blank"

# List of links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# text: The displayed text for the link
# title: The url title
# url: The URL of the link
# alt: Alternative text for accessibility
# target: `_blank` opens in a new tab, `_self` opens in the same frame
links:
  - link:
      icon: "fa-brands fa-spotify"
      text: "Spotify"
      url: "https://open.spotify.com/artist/6VI0p0xTjBKKxQN8i8vGpD"
      alt: "Spotify"
      title: "Spotify"
      target: "_blank"



